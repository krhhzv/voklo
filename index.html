
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VokLo</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: 'Inter', sans-serif; }
input { font-size:16px; }

.card {
  background: #ffffff;
  border-radius: 16px;
}

button {
  transition: 0.2s;
}
button:active {
  transform: scale(0.96);
}
</style>
</head>

<body class="bg-gray-50">

<!-- HEADER -->
<header class="flex justify-between items-center px-5 py-4 bg-white border-b">
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">V</div>
    <span class="font-semibold">VokLo</span>
  </div>

  <button onclick="openPreview()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg">
    Preview
  </button>
</header>

<!-- MAIN -->
<div class="max-w-[900px] mx-auto p-4 space-y-5 pb-24">

<div id="invoice" class="space-y-5">

<div class="card p-4 shadow">
<input id="client" class="w-full font-semibold outline-none bg-transparent" value="Client Name">
</div>

<div id="items" class="space-y-3"></div>

<button onclick="addItem()" class="w-full py-3 bg-indigo-100 rounded-lg">
+ Add Item
</button>

<div class="card p-4 shadow flex justify-between">
<span>Total</span>
<span id="total">$0</span>
</div>

</div>

</div>

<!-- MOBILE ACTION BAR -->
<div class="fixed bottom-0 left-0 right-0 p-3 bg-white flex gap-2 shadow z-50">
<button onclick="exportPNG()" class="flex-1 bg-gray-200 py-3 rounded-lg">PNG</button>
<button onclick="exportPDF()" class="flex-1 bg-indigo-600 text-white py-3 rounded-lg">PDF</button>
<button onclick="sendWhatsApp()" class="flex-1 bg-indigo-100 py-3 rounded-lg">WA</button>
</div>

<!-- PREVIEW MODAL -->
<div id="previewModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
<div class="bg-white w-[90%] max-w-[600px] p-5 rounded-xl">

<h2 class="font-semibold mb-3">Invoice Preview</h2>

<div id="previewContent" class="space-y-2 text-sm"></div>

<div class="flex gap-2 mt-4">
<button onclick="exportPDF()" class="flex-1 bg-indigo-600 text-white py-2 rounded">Download</button>
<button onclick="closePreview()" class="flex-1 bg-gray-200 py-2 rounded">Close</button>
</div>

</div>
</div>

<script>
let invoices = JSON.parse(localStorage.getItem("voklo_all")) || [{items:[]}];
let currentIndex = 0;
let items = invoices[currentIndex].items;

// RENDER
function render(){
let el = document.getElementById("items");
el.innerHTML = "";

items.forEach((item,i)=>{
el.innerHTML += `
<div class="card p-3 shadow flex gap-2 items-center">
<input value="${item.name}" oninput="items[${i}].name=this.value" class="flex-1 outline-none">
<input type="number" value="${item.price}" oninput="updatePrice(${i},this.value)" class="w-20 text-right outline-none">
<button onclick="removeItem(${i})">✕</button>
</div>`;
});

updateTotal();
save();
}

// UPDATE
function updatePrice(i,val){
items[i].price = parseFloat(val) || 0;
updateTotal();
}

function updateTotal(){
let t = items.reduce((a,b)=>a+b.price,0);
document.getElementById("total").innerText = "$" + t;
}

// CRUD
function addItem(){
items.push({name:"New",price:0});
render();
}

function removeItem(i){
items.splice(i,1);
render();
}

// STORAGE
function save(){
invoices[currentIndex].items = items;
localStorage.setItem("voklo_all", JSON.stringify(invoices));
}

// PREVIEW
function openPreview(){
let el = document.getElementById("previewContent");
el.innerHTML = "";
let total = 0;

items.forEach(i=>{
total += i.price;
el.innerHTML += `
<div class="flex justify-between">
<span>${i.name}</span>
<span>$${i.price}</span>
</div>`;
});

el.innerHTML += `
<hr>
<div class="flex justify-between font-bold">
<span>Total</span>
<span>$${total}</span>
</div>`;

document.getElementById("previewModal").classList.remove("hidden");
document.getElementById("previewModal").classList.add("flex");
}

function closePreview(){
document.getElementById("previewModal").classList.add("hidden");
document.getElementById("previewModal").classList.remove("flex");
}

// EXPORT
function cloneInvoice(){
const clone = document.getElementById("invoice").cloneNode(true);
clone.style.position = "fixed";
clone.style.top = "-9999px";
clone.style.width = "794px";
clone.style.background = "white";
document.body.appendChild(clone);
return clone;
}

async function exportPNG(){
let c = cloneInvoice();
let canvas = await html2canvas(c,{scale:3});

let link = document.createElement("a");
link.download = "voklo.png";
link.href = canvas.toDataURL();
link.click();

c.remove();
}

async function exportPDF(){
let c = cloneInvoice();
let canvas = await html2canvas(c,{scale:2});

let img = canvas.toDataURL("image/png");
let {jsPDF} = window.jspdf;

let pdf = new jsPDF("p","px","a4");
pdf.addImage(img,"PNG",0,0,794,1123);
pdf.save("voklo.pdf");

c.remove();
}

// WHATSAPP
function sendWhatsApp(){
let t = document.getElementById("total").innerText;
let msg = encodeURIComponent(`VokLo Invoice\nTotal: ${t}`);
window.open(`https://wa.me/?text=${msg}`);
}

render();
</script>

</body>
</html>
