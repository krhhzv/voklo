<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VokLo</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50">

    <!-- DESKTOP HEADER -->
    <div class="hidden md:flex justify-between items-center p-4 bg-white border-b">
        <h1 class="text-xl font-bold text-indigo-500">VokLo</h1>
        <div class="flex gap-2">
            <button onclick="exportPDF()" class="px-4 py-2 bg-indigo-500 text-white rounded-lg">PDF</button>
            <button onclick="exportPNG()" class="px-4 py-2 bg-gray-200 rounded-lg">PNG</button>
            <button onclick="sendWhatsApp()" class="px-4 py-2 bg-indigo-200 rounded-lg">WhatsApp</button>
        </div>
    </div>

    <div class="md:flex md:h-screen">

        <!-- MAIN -->
        <div class="flex-1 overflow-y-auto p-4">

            <!-- MOBILE HEADER -->
            <div class="md:hidden mb-4 font-bold text-indigo-500">VokLo</div>

            <div id="invoice" class="space-y-4 md:max-w-[800px] md:mx-auto">

                <!-- CLIENT -->
                <div class="bg-white p-4 rounded-xl shadow">
                    <input id="client" class="w-full font-semibold outline-none" value="Client Name">
                </div>

                <!-- ITEMS -->
                <div id="items" class="space-y-3"></div>

                <button onclick="addItem()" class="w-full py-3 bg-indigo-100 rounded-xl">
                    + Add Item
                </button>

                <!-- MOBILE TOTAL -->
                <div class="bg-white p-4 rounded-xl shadow md:hidden">
                    <div class="flex justify-between">
                        <span>Total</span>
                        <span id="total">$0</span>
                    </div>
                </div>

            </div>
        </div>

        <!-- DESKTOP PANEL -->
        <div class="hidden md:block w-[320px] bg-white border-l p-4 space-y-4">

            <!-- INVOICE SWITCH -->
            <button onclick="newInvoice()" class="w-full bg-indigo-500 text-white py-2 rounded-lg">
                + New Invoice
            </button>

            <div id="invoiceList" class="space-y-1"></div>

            <h2 class="font-semibold mt-4">Analytics</h2>

            <div class="p-3 bg-indigo-50 rounded-xl">
                <p>Total</p>
                <p id="stat-total">$0</p>
            </div>

            <div class="p-3 bg-gray-100 rounded-xl">
                <p>Items</p>
                <p id="stat-count">0</p>
            </div>

            <div class="p-3 bg-gray-100 rounded-xl">
                <p>Avg</p>
                <p id="stat-avg">$0</p>
            </div>

            <!-- INSIGHT -->
            <div class="p-3 bg-indigo-50 rounded-xl text-sm" id="insight"></div>

            <!-- CHARTS -->
            <div class="h-[180px] bg-white p-2 rounded-xl shadow">
                <canvas id="barChart"></canvas>
            </div>

            <div class="h-[180px] bg-white p-2 rounded-xl shadow">
                <canvas id="pieChart"></canvas>
            </div>

        </div>

    </div>

    <!-- MOBILE ACTION BAR -->
    <div class="fixed bottom-0 left-0 right-0 p-3 bg-white flex gap-2 shadow md:hidden">
        <button onclick="exportPNG()" class="flex-1 bg-gray-200 py-3 rounded-xl">PNG</button>
        <button onclick="exportPDF()" class="flex-1 bg-indigo-500 text-white py-3 rounded-xl">PDF</button>
        <button onclick="sendWhatsApp()" class="flex-1 bg-indigo-200 py-3 rounded-xl">WA</button>
    </div>

    <script>
        // ===== DATA =====
        let invoices = JSON.parse(localStorage.getItem("voklo_all")) || [{ items: [] }];
        let currentIndex = 0;
        let items = invoices[currentIndex].items;

        let barChart, pieChart;

        // ===== RENDER =====
        function render() {
            const el = document.getElementById("items");
            el.innerHTML = "";

            let total = 0;

            items.forEach((item, i) => {
                total += item.price;

                el.innerHTML += `
      <div class="bg-white p-4 rounded-xl shadow flex gap-2">
        <input value="${item.name}" 
          onchange="items[${i}].name=this.value;render()"
          class="flex-1 outline-none">

        <input type="number" value="${item.price}" 
          onchange="items[${i}].price=parseFloat(this.value)||0;render()"
          class="w-20 text-right outline-none">

        <button onclick="removeItem(${i})">✕</button>
      </div>
    `;
            });

            document.getElementById("total").innerText = "$" + total;

            updateAnalytics(total);
            updateInsights(total);
            renderCharts();
            renderInvoiceList();
            saveAll();
        }

        // ===== CRUD =====
        function addItem() {
            items.push({ name: "New", price: 0 });
            render();
        }

        function removeItem(i) {
            items.splice(i, 1);
            render();
        }

        // ===== STORAGE =====
        function saveAll() {
            invoices[currentIndex].items = items;
            localStorage.setItem("voklo_all", JSON.stringify(invoices));
        }

        // ===== MULTI INVOICE =====
        function newInvoice() {
            invoices.push({ items: [] });
            currentIndex = invoices.length - 1;
            items = invoices[currentIndex].items;
            render();
        }

        function switchInvoice(i) {
            currentIndex = i;
            items = invoices[i].items;
            render();
        }

        function renderInvoiceList() {
            const el = document.getElementById("invoiceList");
            el.innerHTML = "";

            invoices.forEach((_, i) => {
                el.innerHTML += `
      <div onclick="switchInvoice(${i})"
        class="p-2 rounded cursor-pointer ${i === currentIndex ? 'bg-indigo-100' : ''}">
        Invoice ${i + 1}
      </div>
    `;
            });
        }

        // ===== ANALYTICS =====
        function updateAnalytics(total) {
            if (!items.length) return;

            document.getElementById("stat-total").innerText = "$" + total;
            document.getElementById("stat-count").innerText = items.length;
            document.getElementById("stat-avg").innerText = "$" + (total / items.length).toFixed(2);
        }

        function updateInsights(total) {
            if (!items.length) return;

            const prices = items.map(i => i.price);
            const max = Math.max(...prices);
            const min = Math.min(...prices);

            document.getElementById("insight").innerText =
                `Top: $${max} | Lowest: $${min} | Total: $${total}`;
        }

        // ===== CHARTS =====
        function renderCharts() {
            if (!items.length) return;

            const labels = items.map(i => i.name);
            const data = items.map(i => i.price);

            const barCtx = document.getElementById("barChart").getContext("2d");
            const gradient = barCtx.createLinearGradient(0, 0, 0, 200);
            gradient.addColorStop(0, "#6366F1");
            gradient.addColorStop(1, "#A5B4FC");

            if (barChart) barChart.destroy();

            barChart = new Chart(barCtx, {
                type: "bar",
                data: { labels, datasets: [{ data, backgroundColor: gradient, borderRadius: 6 }] },
                options: { maintainAspectRatio: false }
            });

            const pieCtx = document.getElementById("pieChart").getContext("2d");

            if (pieChart) pieChart.destroy();

            pieChart = new Chart(pieCtx, {
                type: "doughnut",
                data: {
                    labels,
                    datasets: [{
                        data,
                        backgroundColor: ["#6366F1", "#818CF8", "#A5B4FC", "#C7D2FE"]
                    }]
                },
                options: { cutout: "60%", maintainAspectRatio: false }
            });
        }

        // ===== EXPORT (NO SHAKE) =====
        function cloneInvoice() {
            const clone = document.getElementById("invoice").cloneNode(true);
            clone.style.position = "fixed";
            clone.style.top = "-9999px";
            clone.style.width = "794px";
            clone.style.background = "white";
            document.body.appendChild(clone);
            return clone;
        }

        async function exportPNG() {
            const clone = cloneInvoice();
            const canvas = await html2canvas(clone, { scale: 3 });
            const link = document.createElement("a");
            link.download = "voklo.png";
            link.href = canvas.toDataURL();
            link.click();
            clone.remove();
        }

        async function exportPDF() {
            const clone = cloneInvoice();
            const canvas = await html2canvas(clone, { scale: 2 });

            const img = canvas.toDataURL("image/png");
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF("p", "px", "a4");

            const pageHeight = 1123;
            const imgHeight = canvas.height;
            let pos = 0;

            while (pos < imgHeight) {
                pdf.addImage(img, "PNG", 0, -pos, 794, imgHeight);
                pos += pageHeight;
                if (pos < imgHeight) pdf.addPage();
            }

            pdf.save("voklo.pdf");
            clone.remove();
        }

        // ===== WHATSAPP =====
        function sendWhatsApp() {
            const total = document.getElementById("total").innerText;
            const msg = encodeURIComponent(`VokLo Invoice\nTotal: ${total}`);
            window.open(`https://wa.me/?text=${msg}`);
        }

        render();
    </script>

</body>

</html>
