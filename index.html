<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VokLo Invoice</title>
  <link rel="icon" type="image/png" href="logo.png">

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body class="bg-gray-50 antialiased pb-28">

  <!-- HEADER -->
  <header
    class="flex justify-between items-center px-6 py-4 bg-white/90 backdrop-blur-md border-b border-gray-200 sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <div
        class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-sm shadow-sm">
        V</div>
      <span class="font-semibold tracking-tight text-gray-900">VokLo</span>
    </div>

    <button onclick="openPreview()"
      class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg shadow-sm hover:bg-indigo-700">
      Preview
    </button>
  </header>

  <!-- MAIN -->
  <div class="max-w-[800px] mx-auto p-4 md:p-6 space-y-6">

    <div id="invoice" class="space-y-5">

      <div class="card p-5">
        <input id="client" class="w-full text-lg font-semibold outline-none bg-transparent text-gray-900"
          placeholder="Client Name" value="Client Name">
      </div>

      <div id="items" class="space-y-3"></div>

      <button id="add-item-btn" onclick="addItem()"
        class="w-full py-3 bg-indigo-100 rounded-lg text-gray-900 font-medium transition-colors hover:bg-indigo-200">
        + Add Item
      </button>

      <div class="card p-5 flex justify-between items-center">
        <span class="font-medium text-gray-600">Total Due</span>
        <span id="total" class="text-xl font-bold text-gray-900">$0</span>
      </div>

    </div>

  </div>

  <!-- MOBILE ACTION BAR -->
  <div
    class="fixed bottom-4 left-4 right-4 md:left-auto md:right-6 md:w-[360px] p-2 bg-white/90 backdrop-blur-lg border border-gray-200 rounded-2xl flex gap-2 shadow-xl z-50">
    <button onclick="exportPNG()"
      class="flex-1 bg-gray-200 border border-gray-200 hover:bg-gray-300 py-2.5 rounded-xl text-sm font-medium text-gray-800 shadow-sm transition-colors">PNG</button>
    <button onclick="exportPDF()"
      class="flex-[1.25] bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-xl text-sm font-medium shadow-sm transition-colors">PDF</button>
    <button id="share-btn" onclick="sendWhatsApp()"
      class="flex-[1.25] bg-[#25D366] hover:bg-[#20bd5a] text-white py-2.5 rounded-xl text-sm font-medium shadow-sm transition-colors">WhatsApp</button>
  </div>

  <!-- PREVIEW MODAL -->
  <div id="previewModal"
    class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm hidden items-center justify-center z-50 p-4 opacity-0 transition-opacity duration-300">
    <div
      class="bg-white w-full max-w-[500px] p-6 rounded-2xl shadow-xl transform scale-95 transition-transform duration-300"
      id="previewCard">

      <div class="flex justify-between items-center mb-6">
        <h2 class="font-semibold text-lg text-gray-900">Invoice Summary</h2>
        <button onclick="closePreview()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <div id="previewContent" class="space-y-3 text-sm text-gray-600 mb-6"></div>

      <div class="flex gap-3">
        <button onclick="exportPDF()"
          class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-xl font-medium shadow-sm transition-colors">Download
          PDF</button>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
