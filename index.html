<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VokLo</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: 'Inter', sans-serif; }

/* subtle glass feel */
.card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(8px);
}
</style>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100">

<!-- 🔷 HEADER -->
<header class="flex items-center justify-between px-6 py-4 bg-white border-b shadow-sm">

  <div class="flex items-center gap-3">
    <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold shadow">
      V
    </div>
    <span class="font-semibold text-lg">VokLo</span>
  </div>

  <div class="hidden md:flex gap-2">
    <button onclick="exportPDF()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:opacity-90">PDF</button>
    <button onclick="exportPNG()" class="px-4 py-2 bg-gray-200 rounded-lg">PNG</button>
    <button onclick="sendWhatsApp()" class="px-4 py-2 bg-indigo-100 rounded-lg">WhatsApp</button>
  </div>

</header>

<!-- 🔷 MAIN -->
<div class="grid md:grid-cols-[1fr_380px] h-[calc(100vh-72px)]">

  <!-- LEFT -->
  <div class="overflow-y-auto p-6 space-y-6">

    <!-- CLIENT -->
    <div class="card p-5 rounded-2xl shadow">
      <input id="client" class="w-full text-lg font-semibold outline-none bg-transparent" value="Client Name">
    </div>

    <!-- ITEMS -->
    <div id="items" class="space-y-3"></div>

    <button onclick="addItem()" 
      class="w-full py-3 rounded-xl bg-indigo-100 hover:bg-indigo-200 transition">
      + Add Item
    </button>

    <!-- MOBILE TOTAL -->
    <div class="card p-5 rounded-2xl shadow md:hidden flex justify-between">
      <span>Total</span>
      <span id="total" class="font-bold">$0</span>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="hidden md:flex flex-col border-l bg-white p-5 gap-5">

    <!-- NEW -->
    <button onclick="newInvoice()" 
      class="py-3 rounded-xl bg-indigo-600 text-white font-medium shadow">
      + New Invoice
    </button>

    <!-- LIST -->
    <div id="invoiceList" class="space-y-1"></div>

    <!-- ANALYTICS -->
    <div class="space-y-3">

      <h2 class="font-semibold text-gray-700">Analytics</h2>

      <div class="grid grid-cols-3 gap-2">
        <div class="p-3 bg-indigo-50 rounded-xl text-sm">
          <p>Total</p>
          <p id="stat-total">$0</p>
        </div>

        <div class="p-3 bg-gray-100 rounded-xl text-sm">
          <p>Items</p>
          <p id="stat-count">0</p>
        </div>

        <div class="p-3 bg-gray-100 rounded-xl text-sm">
          <p>Avg</p>
          <p id="stat-avg">$0</p>
        </div>
      </div>

      <div id="insight" class="text-xs text-gray-500"></div>

    </div>

    <!-- CHARTS -->
    <div class="flex-1 flex flex-col gap-4">

      <div class="flex-1 min-h-[180px] card p-3 rounded-xl shadow">
        <canvas id="barChart"></canvas>
      </div>

      <div class="flex-1 min-h-[180px] card p-3 rounded-xl shadow">
        <canvas id="pieChart"></canvas>
      </div>

    </div>

  </div>

</div>

<!-- 🔷 MOBILE BAR -->
<div class="fixed bottom-0 left-0 right-0 p-3 bg-white flex gap-2 shadow md:hidden">
  <button onclick="exportPNG()" class="flex-1 bg-gray-200 py-3 rounded-xl">PNG</button>
  <button onclick="exportPDF()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl">PDF</button>
  <button onclick="sendWhatsApp()" class="flex-1 bg-indigo-100 py-3 rounded-xl">WA</button>
</div>

<script>
let invoices = JSON.parse(localStorage.getItem("voklo_all")) || [{ items: [] }];
let currentIndex = 0;
let items = invoices[currentIndex].items;

let barChart, pieChart;

function render() {
  const el = document.getElementById("items");
  el.innerHTML = "";

  let total = 0;

  items.forEach((item, i) => {
    total += item.price;

    el.innerHTML += `
      <div class="card p-4 rounded-xl shadow flex gap-2">
        <input value="${item.name}" 
          onchange="items[${i}].name=this.value;render()"
          class="flex-1 bg-transparent outline-none">

        <input type="number" value="${item.price}" 
          onchange="items[${i}].price=parseFloat(this.value)||0;render()"
          class="w-24 text-right bg-transparent outline-none">

        <button onclick="removeItem(${i})">✕</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = "$" + total;

  updateAnalytics(total);
  updateInsights(total);

  setTimeout(renderCharts, 50);

  renderInvoiceList();
  saveAll();
}

function addItem(){ items.push({name:"New",price:0}); render();}
function removeItem(i){ items.splice(i,1); render();}

function saveAll(){
  invoices[currentIndex].items = items;
  localStorage.setItem("voklo_all", JSON.stringify(invoices));
}

function newInvoice(){
  invoices.push({items:[]});
  currentIndex = invoices.length-1;
  items = invoices[currentIndex].items;
  render();
}

function switchInvoice(i){
  currentIndex=i;
  items=invoices[i].items;
  render();
}

function renderInvoiceList(){
  const el=document.getElementById("invoiceList");
  el.innerHTML="";
  invoices.forEach((_,i)=>{
    el.innerHTML+=`
      <div onclick="switchInvoice(${i})"
      class="p-2 rounded cursor-pointer ${i===currentIndex?'bg-indigo-100':''}">
      Invoice ${i+1}
      </div>`;
  });
}

function updateAnalytics(total){
  if(!items.length)return;
  stat-total.innerText="$"+total;
  stat-count.innerText=items.length;
  stat-avg.innerText="$"+(total/items.length).toFixed(2);
}

function updateInsights(total){
  if(!items.length)return;
  let prices=items.map(i=>i.price);
  insight.innerText=`Top: $${Math.max(...prices)} | Low: $${Math.min(...prices)}`;
}

function renderCharts(){
  if(!items.length)return;

  let labels=items.map(i=>i.name);
  let data=items.map(i=>i.price);

  let ctx=document.getElementById("barChart").getContext("2d");
  let gradient=ctx.createLinearGradient(0,0,0,200);
  gradient.addColorStop(0,"#6366F1");
  gradient.addColorStop(1,"#A5B4FC");

  if(barChart)barChart.destroy();
  barChart=new Chart(ctx,{
    type:"bar",
    data:{labels,datasets:[{data,backgroundColor:gradient,borderRadius:6}]},
    options:{maintainAspectRatio:false}
  });

  let pctx=document.getElementById("pieChart").getContext("2d");
  if(pieChart)pieChart.destroy();
  pieChart=new Chart(pctx,{
    type:"doughnut",
    data:{labels,datasets:[{data,backgroundColor:["#6366F1","#818CF8","#A5B4FC","#C7D2FE"]}]},
    options:{cutout:"60%",maintainAspectRatio:false}
  });
}

function cloneInvoice(){
  const clone=invoice.cloneNode(true);
  clone.style.position="fixed";
  clone.style.top="-9999px";
  clone.style.width="794px";
  clone.style.background="white";
  document.body.appendChild(clone);
  return clone;
}

async function exportPNG(){
  let c=cloneInvoice();
  let canvas=await html2canvas(c,{scale:3});
  let link=document.createElement("a");
  link.download="voklo.png";
  link.href=canvas.toDataURL();
  link.click();
  c.remove();
}

async function exportPDF(){
  let c=cloneInvoice();
  let canvas=await html2canvas(c,{scale:2});
  let img=canvas.toDataURL("image/png");
  let {jsPDF}=window.jspdf;
  let pdf=new jsPDF("p","px","a4");

  let h=1123, pos=0;
  while(pos<canvas.height){
    pdf.addImage(img,"PNG",0,-pos,794,canvas.height);
    pos+=h;
    if(pos<canvas.height)pdf.addPage();
  }
  pdf.save("voklo.pdf");
  c.remove();
}

function sendWhatsApp(){
  let total=document.getElementById("total").innerText;
  let msg=encodeURIComponent(`VokLo Invoice\nTotal: ${total}`);
  window.open(`https://wa.me/?text=${msg}`);
}

render();
</script>

</body>
</html>
